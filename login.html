<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — มหาวิทยาลัยรับสมัครผู้จบ ปวส.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword,
                 createUserWithEmailAndPassword, sendPasswordResetEmail }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyB_ucVfdd-BpTRbtHWZ9LyiETduVIYKCqE",
            authDomain:        "myuniversityguide-c083c.firebaseapp.com",
            projectId:         "myuniversityguide-c083c",
            storageBucket:     "myuniversityguide-c083c.firebasestorage.app",
            messagingSenderId: "649652214412",
            appId:             "1:649652214412:web:06937089fc7bbe111579a9"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ===== เข้าสู่ระบบ =====
        window.handleLogin = async function () {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl    = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!email || !password) {
                errEl.textContent = 'กรุณากรอกอีเมลและรหัสผ่านให้ครบครับ';
                return;
            }

            setLoading(true);
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = getErrorMessage(err.code);
                setLoading(false);
            }
        };

        // ===== ลงทะเบียน =====
        window.handleRegister = async function () {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl    = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!email || !password) {
                errEl.textContent = 'กรุณากรอกอีเมลและรหัสผ่านให้ครบครับ';
                return;
            }
            if (password.length < 6) {
                errEl.textContent = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรครับ';
                return;
            }

            setLoading(true);
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = getErrorMessage(err.code);
                setLoading(false);
            }
        };

        // ===== ลืมรหัสผ่าน =====
        window.handleForgotPassword = async function () {
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = '';

    if (!email) {
        errEl.textContent = 'กรุณากรอกอีเมลในช่องด้านบนก่อนนะครับ';
        return;
    }

    // กำหนด URL ที่จะ redirect หลัง reset password
    const actionCodeSettings = {
        url: 'https://lukchup.github.io/peeplaek/login.html',
        handleCodeInApp: false
    };

    try {
        await sendPasswordResetEmail(auth, email, actionCodeSettings);
        showToast('✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ ' + email + ' แล้วครับ กรุณาเช็ค inbox');
    } catch (err) {
        errEl.textContent = getErrorMessage(err.code);
    }
};

        // ===== แปล error code =====
        function getErrorMessage(code) {
            const map = {
                'auth/invalid-email':       'รูปแบบอีเมลไม่ถูกต้องครับ',
                'auth/user-not-found':      'ไม่พบบัญชีนี้ในระบบครับ',
                'auth/wrong-password':      'รหัสผ่านไม่ถูกต้องครับ',
                'auth/email-already-in-use':'อีเมลนี้ถูกใช้งานแล้วครับ',
                'auth/weak-password':       'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรครับ',
                'auth/too-many-requests':   'ลองใหม่อีกครั้งในภายหลังนะครับ',
                'auth/invalid-credential':  'อีเมลหรือรหัสผ่านไม่ถูกต้องครับ',
            };
            return map[code] || 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งครับ';
        }

        function setLoading(state) {
            document.getElementById('loginBtn').disabled    = state;
            document.getElementById('registerBtn').disabled = state;
            document.getElementById('loginBtn').textContent    = state ? 'กำลังดำเนินการ...' : 'เข้าสู่ระบบ';
        }

        // กด Enter ส่งได้เลย
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password').addEventListener('keydown', e => {
                if (e.key === 'Enter') window.handleLogin();
            });
        });
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: #f5f5f3;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== Card ===== */
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
        }

        /* ===== Header ===== */
        .login-logo {
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            text-align: center;
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-bottom: 32px;
        }

        /* ===== Form ===== */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #111;
            background: #fff;
        }
        .form-group input::placeholder { color: #bbb; }

        /* ===== Error ===== */
        .error-msg {
            font-size: 13px;
            color: #c81e1e;
            text-align: center;
            min-height: 20px;
            margin-bottom: 12px;
        }

        /* ===== Buttons ===== */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary:hover    { background: #333; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

        .btn-secondary {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: #111;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover    { border-color: #111; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== Divider ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider-line { flex: 1; height: 1px; background: #eee; }
        .divider-text { font-size: 12px; color: #bbb; white-space: nowrap; }

        /* ===== Forgot password ===== */
        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: #111; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card { padding: 36px 24px 32px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">🎓</div>
        <h1 class="login-title">มหาวิทยาลัยรับสมัครผู้จบ ปวส.</h1>
        <p class="login-subtitle">เข้าสู่ระบบเพื่อเริ่มค้นหามหาวิทยาลัยที่ใช่</p>

        <div class="form-group">
            <label for="email">อีเมล</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร">
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
            เข้าสู่ระบบ
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">ยังไม่มีบัญชี?</span>
            <div class="divider-line"></div>
        </div>

        <button class="btn-secondary" id="registerBtn" onclick="handleRegister()">
            ลงทะเบียนสมาชิกใหม่
        </button>

        <a class="forgot-link" onclick="handleForgotPassword()">
            ลืมรหัสผ่าน?
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg, duration = 3500) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }
    </script>

</body>
</html>
