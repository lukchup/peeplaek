<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - คู่มือมหาวิทยาลัยในประเทศไทย</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    
    <link href="tooplate-minimal-white-style.css" rel="stylesheet">
    <style>
        /* เอฟเฟกต์กล่องสั่นเมื่อเกิดข้อผิดพลาด */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ตั้งค่าสไตล์มินิมอลและคุมระบบฟอนต์ */
        body { 
            background-color: #f9f9f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
        }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border-radius: 12px; /* เติมความโค้งมนเล็กน้อยให้ดูทันสมัย */
        }

        /* หัวข้อหลักใช้ฟอนต์ Prompt */
        .login-card h2 {
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            font-size: 22px;
            margin-bottom: 30px;
            color: #111;
        }

        .form-group { position: relative; margin-bottom: 25px; text-align: left; }
        .form-group input { width: 100%; padding: 10px 0; border: none; border-bottom: 1px solid #ddd; outline: none; background: transparent; font-family: 'Sarabun', sans-serif; font-size: 15px; }
        .form-group label { position: absolute; top: 10px; left: 0; color: #999; pointer-events: none; transition: 0.3s; font-size: 15px; }
        .form-group input:focus ~ label, .form-group input:not(:placeholder-shown) ~ label { top: -15px; font-size: 12px; color: #000; }
        
        /* ปุ่มและข้อความแจ้งเตือนใช้ฟอนต์ Prompt เพื่อความชัดเจนและสวยงาม */
        .submit-btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; letter-spacing: 1px; font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .submit-btn:hover { background: #222; }
        
        .secondary-btn { width: 100%; padding: 10px; background: #fff; color: #000; border: 1px solid #000; margin-top: 10px; cursor: pointer; font-family: 'Prompt', sans-serif; font-size: 13px; font-weight: 400; transition: all 0.2s; }
        .secondary-btn:hover { background: #f5f5f5; }
        
        #message { font-family: 'Prompt', sans-serif; margin-top: 15px; font-size: 13px; font-weight: 400; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>มหาวิทยาลัยรับสมัครผู้จบ ปวส.</h2>
    <form id="loginForm">
        <div class="form-group">
            <input type="email" id="loginEmail" placeholder=" " required>
            <label>อีเมล</label>
        </div>
        <div class="form-group">
            <input type="password" id="loginPassword" placeholder=" " required>
            <label>รหัสผ่าน</label>
        </div>
        <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>
        <button type="button" id="signUpBtn" class="secondary-btn">ลงทะเบียนสมาชิก</button>
        <p id="message"></p>
        
        <button onclick="handleLogin()">เข้าสู่ระบบ</button>
        <p style="text-align:center; margin-top:10px;">
            <a href="#" onclick="handleForgotPassword()" 
               style="font-size:13px; color:#888; text-decoration:none;">
                ลืมรหัสผ่าน?
    </a>
</p>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           sendPasswordResetEmail} 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    

    // 1. Firebase Config ของคุณ
    const firebaseConfig = {
        apiKey: "AIzaSyB_ucVfdd-BpTRbtHWZ9LyiETduVIYKCqE",
        authDomain: "myuniversityguide-c083c.firebaseapp.com",
        projectId: "myuniversityguide-c083c",
        storageBucket: "myuniversityguide-c083c.firebasestorage.app",
        messagingSenderId: "649652214412",
        appId: "1:649652214412:web:06937089fc7bbe111579a9"
    };

    // 2. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('loginForm');
    const msg = document.getElementById('message');

    // 3. ฟังก์ชัน Login (ภาษาไทย)
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const emailField = document.getElementById('loginEmail');
        const passwordField = document.getElementById('loginPassword');
        const email = emailField.value;
        const password = passwordField.value;

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                msg.style.color = "#28a745"; // สีเขียวมินิมอล
                msg.innerText = "เข้าสู่ระบบสำเร็จ! กำลังนำคุณเข้าสู่หน้าหลัก...";
                setTimeout(() => window.location.href = "index.html", 1500);
            })
            .catch((error) => {
                msg.style.color = "#d9534f"; // สีแดงซอฟต์
                
                // แปลงคำแจ้งเตือน Error เป็นภาษาไทยที่เข้าใจง่าย
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/invalid-credential': // รองรับอัปเดต Firebase Auth ใหม่ที่รวมยอด Error Code
                        msg.innerText = "ไม่พบบัญชีผู้ใช้ หรือข้อมูลประจำตัวไม่ถูกต้อง";
                        break;
                    case 'auth/wrong-password':
                        msg.innerText = "รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง";
                        break;
                    case 'auth/invalid-email':
                        msg.innerText = "รูปแบบอีเมลไม่ถูกต้อง";
                        break;
                    case 'auth/too-many-requests':
                        msg.innerText = "ระงับการเข้าสู่ระบบชั่วคราวเนื่องจากลองผิดมากเกินไป กรุณารอสักครู่";
                        break;
                    default:
                        msg.innerText = "เข้าสู่ระบบไม่สำเร็จ กรุณาตรวจสอบข้อมูลอีกครั้ง";
                }

                // ล้างข้อความในช่องกรอกข้อมูลเพื่อให้ลองใหม่ได้ทันที
                emailField.value = "";
                passwordField.value = "";
                
                // คืนค่า Floating Label ให้กลับมาที่ตำแหน่งเดิม
                emailField.blur();
                passwordField.blur();

                // เอฟเฟกต์เขย่ากล่องเตือน
                const card = document.querySelector('.login-card');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            });
    });

    // 4. ฟังก์ชัน Register สมัครสมาชิก (ภาษาไทย)
    document.getElementById('signUpBtn').addEventListener('click', () => {
        const emailField = document.getElementById('loginEmail');
        const passwordField = document.getElementById('loginPassword');
        const email = emailField.value;
        const password = passwordField.value;

        if(!email || !password) {
            msg.style.color = "#d9534f";
            msg.innerText = "กรุณากรอกทั้งอีเมลและรหัสผ่านเพื่อสมัครใช้งาน";
            return;
        }

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                msg.style.color = "#1a56db"; // สีน้ำเงินสไตล์เดียวกับหน้าแรก
                msg.innerText = "ลงทะเบียนสำเร็จ! คุณสามารถกด 'เข้าสู่ระบบ' ได้ทันที";
                window.location.href = "index.html";
            })
            .catch((error) => {
                msg.style.color = "#d9534f";
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        msg.innerText = "อีเมลนี้ถูกใช้งานในระบบแล้ว";
                        break;
                    case 'auth/weak-password':
                        msg.innerText = "รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร";
                        break;
                    case 'auth/invalid-email':
                        msg.innerText = "รูปแบบอีเมลไม่ถูกต้อง";
                        break;
                    default:
                        msg.innerText = "การลงทะเบียนล้มเหลว กรุณาลองใหม่อีกครั้ง";
                }
                
                // ล้างค่าข้อมูล
                emailField.value = "";
                passwordField.value = "";
                emailField.blur();
                passwordField.blur();
            });
    });
    // 5.===== ลืมรหัสผ่าน =====
window.handleForgotPassword = async function () {
    const email = document.getElementById('email').value.trim();

    if (!email) {
        alert('กรุณาใส่ email ของคุณในช่อง email ก่อนนะครับ');
        return;
    }

    try {
        await sendPasswordResetEmail(auth, email);
        alert('✅ ส่ง link รีเซ็ตรหัสผ่านไปที่ ' + email + ' แล้วครับ\nกรุณาเช็ค inbox (และ spam) ด้วยนะ');
    } catch (err) {
        if (err.code === 'auth/user-not-found') {
            alert('❌ ไม่พบ email นี้ในระบบครับ');
        } else {
            alert('❌ เกิดข้อผิดพลาด: ' + err.message);
        }
    }
};
</script>

</body>
</html>
